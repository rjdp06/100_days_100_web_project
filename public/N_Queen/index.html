<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N-Queens Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:linear-gradient(90deg, rgba(124,99,255,0.14), rgba(79,141,255,0.10));color:#fff;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(12,18,40,0.35);">← Back to Home</a>

  <div class="container">

    <h1>N-Queens Game</h1>

    <div class="borad-details">
        <div class="board-size">
            <label for="boardSize">Choose Board Size (N):</label>
            <input type="number" id="boardSize" min="4" value="4">
        </div>
        <div class="start-reset-button">
            <button id="startGame">Start Game</button>
        </div>
    </div>
   
    <button id="resetGame" class="reset-button" style="display: none;">Reset Game</button>
    <p id="message"></p>
    <div id="gameBoard"></div>
    
  </div>  
  <script src="script.js"></script>
</body>
</html>
