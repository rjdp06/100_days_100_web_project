<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">  
  <title>Notes App</title>
 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
   <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1><center>NOTES APP</center></h1>
  
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search notes...">
  </div>
  
  <div class="popup-box">
    <div class="popup">
      <div class="content">
        <header>
          <p></p>
          <i class="uil uil-times"></i>
        </header>
        <form action="#" class="was-validated">
          <div class="row title">
            <label>Title</label>
            <input type="text" spellcheck="false" required>
            <div class="invalid-feedback">This Field is Required!!</div>
          </div>
          <div class="row description">
            <label>Description</label>
            <textarea spellcheck="false" required></textarea>
            <div class="invalid-feedback">Enter some description</div>
          </div>
          <div class="row tags">
            <label>Tags</label>
            <input type="text" spellcheck="false" placeholder="Enter tags separated by commas">
          </div>
          <div class="row password">
            <label>Password</label>
            <input type="password" spellcheck="false">
          </div>
          <button></button>
        </form>
      </div>
    </div>
  </div>
  <div class="wrapper">
    <li class="add-box">
      <div class="icon"><i class="uil uil-plus"></i></div>
      <p>Add new note</p>
    </li>
  </div>

  <script src="script.js"></script>
</body>
</html>
