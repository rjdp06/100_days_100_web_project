name: Label Merge Conflicts

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-merge-conflicts:
    runs-on: ubuntu-latest
    steps:
      - name: Label PRs with merge conflicts
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelName = 'merge-conflicts';

            try {
              await github.rest.issues.getLabel({
                owner,
                repo,
                name: labelName,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.issues.createLabel({
                owner,
                repo,
                name: labelName,
                color: 'd73a4a',
                description: 'Pull request has merge conflicts',
              });
            }

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            for (const pr of openPulls) {
              const hasLabel = pr.labels.some((label) => label.name === labelName);

              const detailedPr = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number,
              });
              const hasConflicts = detailedPr.data.mergeable_state === 'dirty';

              if (hasConflicts && !hasLabel) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: pr.number,
                  labels: [labelName],
                });
                core.info(`Added '${labelName}' to PR #${pr.number}`);
              }

              if (!hasConflicts && hasLabel) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: pr.number,
                    name: labelName,
                  });
                  core.info(`Removed '${labelName}' from PR #${pr.number}`);
                } catch (error) {
                  if (error.status !== 404) {
                    throw error;
                  }
                }
              }
            }
